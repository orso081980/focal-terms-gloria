name: 02 – Analysis
# Requires 01 to have run first (downloads focal_terms_full.parquet from R2)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install polars pyarrow boto3 numpy matplotlib

      - name: Create directories
        run: mkdir -p output visualizations

      - name: Download focal_terms_full.parquet from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_ACCESS_SECRET }}
        run: |
          python - <<'EOF'
          import boto3, os
          s3 = boto3.client(
              's3',
              endpoint_url='https://977a2b4bf497816f10a436148fcf51b9.r2.cloudflarestorage.com',
              aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          key = "outcomes/01_focal_terms_full.parquet"
          dest = 'output/focal_terms_full.parquet'
          print(f"Downloading {key} -> {dest}...")
          s3.download_file('parquetunistuttgart', key, dest)
          print(f"  saved ({os.path.getsize(dest) / 1e6:.1f} MB)")
          EOF

      - name: Run 02_analysis.py
        run: python full-notebook/02_analysis.py

      - name: Upload outputs to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_ACCESS_SECRET }}
        run: |
          python - <<'EOF'
          import boto3, os
          s3 = boto3.client(
              's3',
              endpoint_url='https://977a2b4bf497816f10a436148fcf51b9.r2.cloudflarestorage.com',
              aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          files = {
              'output/focal_term_counts_per_patent_full.parquet': 'outcomes/02_focal_term_counts_full.parquet',
              'output/term_frequency_full.parquet':               'outcomes/02_term_frequency_full.parquet',
              'output/task2_analysis.json':                       'outcomes/02_analysis_full.json',
              'visualizations/histogram_focal_terms_full.png':    'outcomes/02_histogram_full.png',
          }
          for src, key in files.items():
              print(f"Uploading {src} -> {key} ({os.path.getsize(src) / 1e6:.2f} MB)...")
              s3.upload_file(src, 'parquetunistuttgart', key)
              print("  done.")
          EOF
